<div class="card m-5 capturarActividad">
    <div class="card-body">
      <div class="header">
        <div class="uno">
          <h5 class="card-title">{{ actividad.nombre }}</h5>
          <h6 *ngIf=" actividad.prioridadAlta == true " class="card-subtitle ms-2 text-muted">Prioridad Alta</h6>
        </div>
        <div class="dos">
          <div class="botonCirc Editar"></div>
          <div class="botonCirc Duplicar"></div>
          <div class="botonCirc Salir"></div>
        </div>
      </div>
  
      <div class="secSeparador">
        <div class="linea"></div>
        <div class="separadorLabel">Información</div>
      </div>
  
      <div class="infoBlock">
        <div>{{actividad.cliente}} - {{actividad.proyecto}}</div>
        <div>Creada por: {{actividad.autor}} </div>
        <div>Fecha: {{actividad.fecha}} </div>
      </div>
  


      <!-- --- componente hijo --- -->

      <div class="secSeparador">
        <div class="linea"></div>
        <div class="separadorLabel">Registro de tiempo</div>
      </div>

      <div class="inputWrapper mb-3 controlTiempo">
        <div class="inputBox">
          <input
            type="text"
            class="inicio first"
            placeholder="Inicio"
            aria-label="Inicio"
            [value]="horaInicio + ' : ' + minutoInicio + ' : ' + segundoInicio"
          />
          <span>Inicio</span>
        </div>
        <div class="inputBox">
          <input
            type="text"
            class="final mid"
            placeholder="Fin"
            aria-label="Fin"
            [value]="horaFinal + ' : ' + minutoFinal + ' : ' + segundoFinal"
          />
          <span>Final</span>
        </div>
        <div class="inputBox">
          <input
            type="text"
            class="total last"
            placeholder="Total"
            aria-label="Total"
            [value]="actividad.tiempoAcumulado.hora + ' : ' + actividad.tiempoAcumulado.minuto + ' : ' + actividad.tiempoAcumulado.segundo"
          />
          <span>Total</span>
        </div>
      </div>

      <!-- --- componente hijo --- -->



      <div class="secSeparador">
        <div class="linea"></div>
        <div class="separadorLabel">Descripción</div>
      </div>
  
      <div class="input-group">
        <textarea
          class="form-control"
          aria-label="With textarea"
          placeholder="Añadir descripción detallada"
        ></textarea>
      </div>
  

      <!-- --- componente hijo --- -->

      <div class="secSeparador">
        <div class="linea"></div>
        <div class="separadorLabel">Check List</div>
      </div>
      <div *ngIf=" actividad.lista.length != 0" class="listWrapp">
        <div *ngFor="let dato of actividad.lista; let i = index" class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [value]="actividad.lista[i].estatus"
            [id]="'lista' + i"
            [checked]="actividad.lista[i].estatus"
          />
          <label class="form-check-label" [for]="'lista' + i">
            {{ actividad.lista[i].contenido }}
          </label>
        </div>
      </div>
      <button type="button" class="btn btn-outline-secondary ms-4 mt-2">Agregar elemento</button>
  
      <!-- --- componente hijo --- -->

      
      <div class="footer">
        <button type="button" class="btn btn-outline-danger">Eliminar Actividad</button>
        <button (click)="start()" type="button" class="btn btn-outline-secondary">{{ buttonLabel }}</button>
        <button (click)="stop()" type="button" class="btn btn-outline-success">Detener</button>
        <button type="button" class="btn btn-outline-success">Guardar</button>
      </div>
    </div>
  </div>
