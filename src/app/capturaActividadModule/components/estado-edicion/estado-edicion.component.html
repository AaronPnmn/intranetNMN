<div class="secSeparador">
    <div class="linea"></div>
    <div class="separadorLabel">Información</div>
</div>


<mat-form-field class="full-width" appearance="outline">
    <mat-label>Titulo de actividad</mat-label>
    <input matInput 
           [value]="actividad.nombre">
</mat-form-field>

<mat-form-field class="full-width" appearance="outline">
  <mat-label>Fecha</mat-label>
  <input matInput [matDatepicker]="picker" [value]="selectedDate">
  <mat-hint>MM/DD/YYYY</mat-hint>
  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker #picker></mat-datepicker>
</mat-form-field>


<table class="full-width" cellspacing="1">
  <tr>

  </tr>
  <tr>
    <td>
      <mat-form-field appearance="outline" class="edicionInput">
        <mat-label>Colaborador</mat-label>
        <select matNativeControl required>
          <option *ngFor="let colaborador of colaboradores; let i = index" [value]="colaborador">{{colaborador}}</option>
        </select>
      </mat-form-field>
    </td>
    <td>
      <mat-form-field appearance="outline" class="edicionInput">
        <mat-label>Cliente</mat-label>
        <select matNativeControl required>
          <option [selected]="cliente === actividad.cliente[0].razon_social" *ngFor="let cliente of clientes; let i = index">{{cliente}}</option>
        </select>
      </mat-form-field>
    </td>
    <td>
      <mat-form-field appearance="outline" class="edicionInput">
        <mat-label>Proyecto</mat-label>
        <select matNativeControl required>
          <option [selected]="proyecto === actividad.proyecto[0].nombre" *ngFor="let proyecto of proyectos; let i = index">{{proyecto}}</option>
        </select>
      </mat-form-field>
    </td>
  </tr>

</table>

<div class="secSeparador">
    <div class="linea"></div>
    <div class="separadorLabel">Registro de tiempo</div>
</div>

<table class="full-width" cellspacing="1">
  <tr>
    <td>
      <mat-form-field appearance="outline" class="edicionInput">
        <mat-label>Inicio</mat-label>
        <input matInput
        type="text"
        [value]="tiempoInicio | timeInit">
      </mat-form-field>
    </td>
    <td>
      <mat-form-field appearance="outline" class="edicionInput">
        <mat-label>Fin</mat-label>
        <input matInput
        type="text"
        [value]="tiempoFinal | timeInit">
      </mat-form-field>
    </td>
    <td>
      <mat-form-field appearance="outline" class="edicionInput">
        <mat-label>Total</mat-label>
        <input matInput
        type="text"
        [value]="tiempoAcumulado.resHor + ':' + tiempoAcumulado.resMin + ':' + tiempoAcumulado.resSeg">
      </mat-form-field>
    </td>
  </tr>
</table>

<div class="secSeparador">
    <div class="linea"></div>
    <div class="separadorLabel">Descripción</div>
  </div>

<div class="input-group">
    <textarea
        class="form-control"
        aria-label="With textarea"
        placeholder="Añadir descripción detallada"
        disabled="true"
    ></textarea>
</div>


<div class="secSeparador">
    <div class="linea"></div>
    <div class="separadorLabel">Check List</div>
  </div>

<div *ngIf=" actividad.lista.length != 0" class="listWrapp">
    <div *ngFor="let dato of actividad.lista; let i = index" class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        [value]="dato.estatus"
        [id]="'lista' + i"
        [checked]="dato.estatus"
        disabled="true"
      />
      <label class="form-check-label" [for]="'lista' + i">
        {{ dato.contenido }}
      </label>
    </div>
</div>

<div class="footer">
  <mat-checkbox class="example-margin">Prioridad alta</mat-checkbox>
  <button mat-raised-button color="warn">Eliminar</button>
  <button mat-raised-button color="primary">Guardar</button>
</div>
